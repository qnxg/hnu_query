name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    # semantic-release 会用 github-actions[bot] 推送 tag；这里跳过，避免重复 publish
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard - ensure tag commit is on main
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tagged commit $GITHUB_SHA is not on origin/main. Refusing to publish." >&2
            exit 1
          fi

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          python3 scripts/verify_tag_matches_cargo.py "$GITHUB_REF_NAME"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

